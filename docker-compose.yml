version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gumucroyal
      POSTGRES_PASSWORD: gumucroyal
      POSTGRES_DB: gumucroyal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://gumucroyal:gumucroyal@db:5432/gumucroyal
      CORS_ORIGINS: '["http://localhost:3000","https://gumucroyal.store"]'
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
